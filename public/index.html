<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>Task Manager</h1>
      <p class="auth-subtitle">Organize your work, one task at a time.</p>
      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab">Login</button>
        <button class="tab-btn" id="registerTab">Register</button>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-full">Login</button>
        <p class="form-message" id="loginMessage"></p>
      </form>
      <form id="registerForm" class="hidden">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="registerName" placeholder="Your Name" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required />
        </div>
        <button type="submit" class="btn btn-full">Create Account</button>
        <p class="form-message" id="registerMessage"></p>
      </form>
    </div>
  </div>
  <script src="/js/auth.js"></script>
</body>
</html>
